<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我替你选择</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="fill: white; stroke: white;">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 2 L14 10 L12 12 L10 10 Z"></path>
            <path d="M12 12 L14 14 L12 22 L10 14 Z"></path>
            <path d="M2 12 L10 10 L12 12 L10 14 Z"></path>
            <path d="M22 12 L14 10 L12 12 L14 14 Z"></path>
        </svg>
        <h1>幸运转盘</h1>
    </header>

    <div class="container">
        <div class="main-content">
            <div class="wheel-section">
                <div class="wheel-container">
                    <canvas id="wheelCanvas"></canvas>
                    <div class="pointer"></div>
                </div>
                <button id="startBtn" class="start-btn">开始旋转</button>
            </div>
            
            <div class="items-section">
                <h2>自定义项目</h2>
                <div class="input-group">
                    <input type="text" id="itemInput" placeholder="输入项目内容" maxlength="20">
                    <button id="addItemBtn" class="add-btn">添加</button>
                </div>
                <div class="items-list" id="itemsList"></div>
                <button id="clearAllBtn" class="clear-btn">清空所有</button>

                <div class="settings-section">
                    <button id="configBtn" class="config-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M7.429 1.525a3.5 3.5 0 0 1 1.142 0 .75.75 0 0 1 .57.498l.331 1a.75.75 0 0 0 .9.5l1.02-.293a.75.75 0 0 1 .79.243 3.504 3.504 0 0 1 .571 1.014.75.75 0 0 1-.22.763l-.737.678a.75.75 0 0 0 0 1.12l.737.678a.75.75 0 0 1 .22.763 3.504 3.504 0 0 1-.571 1.014.75.75 0 0 1-.79.243l-1.02-.293a.75.75 0 0 0-.9.5l-.331 1a.75.75 0 0 1-.57.498 3.5 3.5 0 0 1-1.142 0 .75.75 0 0 1-.57-.498l-.331-1a.75.75 0 0 0-.9-.5l-1.02.293a.75.75 0 0 1-.79-.243 3.504 3.504 0 0 1-.571-1.014.75.75 0 0 1 .22-.763l.737-.678a.75.75 0 0 0 0-1.12l-.737-.678a.75.75 0 0 1-.22-.763 3.504 3.504 0 0 1 .571-1.014.75.75 0 0 1 .79-.243l1.02.293a.75.75 0 0 0 .9-.5l.331-1a.75.75 0 0 1 .57-.498ZM8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"></path></svg>
                        配置
                    </button>
                    <button id="historyBtn" class="config-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 7.5A6.5 6.5 0 1 1 8 14H3.5a.5.5 0 0 1 0-1H8a5.5 5.5 0 1 0-3.546-1.29A.5.5 0 0 1 3.79 13.5 6.5 6.5 0 0 1 1 7.5Z"></path><path d="M3 7.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1H4v2.5a.5.5 0 0 1-1 0v-3Z"></path></svg>
                        历史
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 配置弹窗 -->
    <div id="configModal" class="modal">
        <div class="modal-content config-modal">
            <span class="close" id="closeConfigModal">&times;</span>
            <h2>使用限制设置</h2>
            <div class="setting-item">
                <label class="setting-label">
                    <input type="checkbox" id="limitToggle">
                    <span>开启每日使用限制</span>
                </label>
            </div>
            <div class="setting-item">
                <label class="setting-label">
                    <span>每日可用次数：</span>
                    <input type="number" id="dailyLimit" class="limit-input" min="1" max="100" value="5">
                </label>
            </div>
            <div class="usage-info">
                <p>今日已使用：<span id="usedCount">0</span> 次</p>
                <p>剩余次数：<span id="remainingCount">5</span> 次</p>
            </div>
            <button class="modal-btn" onclick="closeConfigModal()">确定</button>
        </div>
    </div>

    <!-- 转盘悬停提示 -->
    <div id="wheelTooltip" class="wheel-tooltip"></div>

    <!-- 历史记录弹窗 -->
    <div id="historyModal" class="modal">
        <div class="modal-content history-modal">
            <span class="close" id="closeHistoryModal">&times;</span>
            <h2>历史记录</h2>
            <div class="history-actions">
                <button id="clearHistoryBtn" class="clear-history-btn">清空历史</button>
            </div>
            <div class="history-list" id="historyList">
                <p class="empty-history">暂无历史记录</p>
            </div>
            <button class="modal-btn" onclick="closeHistoryModal()">关闭</button>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>结果</h2>
            <p id="resultText"></p>
            <button class="modal-btn" onclick="closeModal()">确定</button>
        </div>
    </div>

    <footer class="site-footer">
        <p>Vanilla JS · 无框架依赖 · 纯前端实现</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
