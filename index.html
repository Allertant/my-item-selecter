<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>我替你选择</title>
    <script>
      // 在 CSS 加载前应用主题和背景色，避免闪烁（FOUC）
      (function() {
        var saved = localStorage.getItem('lucky-wheel-theme');
        var isDark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#0d1117';
          document.body.style.backgroundColor = '#0d1117';
        } else {
          document.documentElement.style.backgroundColor = '#f6f8fa';
          document.body.style.backgroundColor = '#f6f8fa';
        }
      })();
      // 禁用浏览器滚动恢复，避免刷新时恢复不存在的页面滚动位置干扰布局
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    </script>
  </head>
  <body>
    <div id="root" class="h-dvh flex flex-col overflow-hidden"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
